<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cube Grid Dungeon</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #1a1a22; }
    canvas { display: block; }

    /* Login/register gate, shown until authenticate() resolves. */
    .auth-overlay {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      background: #1a1a22;
      font-family: system-ui, sans-serif; color: #d8d8e0;
    }
    .auth-card {
      display: flex; flex-direction: column; gap: 12px;
      width: 260px; padding: 28px;
      background: #23232e; border: 1px solid #34343f; border-radius: 10px;
    }
    .auth-card h1 { margin: 0 0 4px; font-size: 20px; text-align: center; letter-spacing: 1px; }
    .auth-card input {
      padding: 9px 11px; font-size: 14px;
      background: #1a1a22; color: #f0f0f6;
      border: 1px solid #3a3a46; border-radius: 6px;
    }
    .auth-card input:focus { outline: none; border-color: #6a6ad0; }
    .auth-buttons { display: flex; gap: 8px; }
    .auth-buttons button {
      flex: 1; padding: 9px 0; font-size: 14px; cursor: pointer;
      border: 1px solid #3a3a46; border-radius: 6px;
      background: #2e2e3c; color: #f0f0f6;
    }
    .auth-buttons button[data-action="login"] { background: #5a5ac8; border-color: #5a5ac8; }
    .auth-buttons button:disabled { opacity: 0.5; cursor: default; }
    .auth-error { min-height: 16px; margin: 0; font-size: 13px; color: #e88; text-align: center; }
  </style>
</head>
<body>
  <div id="auth" class="auth-overlay">
    <form id="auth-form" class="auth-card">
      <h1>unbrughm</h1>
      <input id="auth-username" name="username" placeholder="username" autocomplete="username" required />
      <input id="auth-password" name="password" type="password" placeholder="password" autocomplete="current-password" required />
      <div class="auth-buttons">
        <button type="submit" data-action="login">Log in</button>
        <button type="submit" data-action="register">Register</button>
      </div>
      <p id="auth-error" class="auth-error"></p>
    </form>
  </div>
  <script type="importmap">
    { "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
  </script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
